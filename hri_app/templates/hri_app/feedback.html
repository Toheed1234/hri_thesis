{% block content %}
<h1>Feedback for {{ animation_type }}</h1>
<div class="feedback-form">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="user_name">Name:</label>
            <input type="text" id="user_name" name="user_name" required>
        </div>
        <div class="form-group">
            <label for="rating">Satisfaction Level:</label>
            <input type="range" id="rating" name="rating" min="1" max="5" value="3" step="1" oninput="this.nextElementSibling.value = this.value">
            <output>3</output>
            <div class="slider-labels">
                <span>Not Satisfied (1)</span>
                <span style="float: right;">Very Satisfied (5)</span>
            </div>
        </div>
        <button type="submit" class="submit-btn">Submit</button>
    </form>
</div>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 20px;
    }
    h1 {
        text-align: center;
        color: #333;
    }
    .feedback-form {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    .form-group {
        margin-bottom: 15px;
    }
    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }
    input[type="text"],
    input[type="range"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
    }
    input[type="range"] {
        width: calc(100% - 20px); /* Adjust width for output */
        margin-top: 10px;
    }
    .slider-labels {
        display: flex;
        justify-content: space-between;
        margin-top: 5px;
        font-size: 14px;
    }
    .submit-btn {
        width: 100%;
        padding: 10px;
        background-color: #007BFF;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
    }
    .submit-btn:hover {
        background-color: #0056b3;
    }
</style>
{% endblock %}
