<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRI Experiment</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f4f8; /* Lighter background for consistency */
        }
        header {
            background-color: #007BFF;
            color: white;
            padding: 20px 0; /* Increased padding for a more spacious header */
            text-align: center;
        }
        nav {
            margin: 10px 0;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            padding: 10px 15px; /* Increased padding for better clickability */
            border-radius: 5px;
            transition: background-color 0.3s;
            font-weight: bold;
        }
        nav a:hover {
            background-color: #0056b3;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #ffffff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); /* Enhanced shadow for depth */
            border-radius: 10px; /* Slightly increased border radius */
        }
        h1 {
            text-align: center;
            color: #333; /* Darker color for better readability */
        }
        footer {
            text-align: center;
            padding: 15px 0; /* Increased padding for a more balanced footer */
            background-color: #007BFF;
            color: white;
            position: relative;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>HRI Experiment</h1>
        <nav>
            <a href="{% url 'home' %}">🏠 Home</a>
        </nav>
    </header>
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
    <footer>
        
    </footer>
</body>
</html>
