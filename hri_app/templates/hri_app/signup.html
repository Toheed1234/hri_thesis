{% extends 'hri_app/base.html' %}
{% block content %}
<h1>Sign Up</h1>

<div class="signup-form">
    {% if error %}
        <p class="error-message">{{ error }}</p>
    {% endif %}
    
    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label for="first_name">First Name:</label>
            <input type="text" id="first_name" name="first_name" required>
        </div>

        <div class="form-group">
            <label for="last_name">Last Name:</label>
            <input type="text" id="last_name" name="last_name" required>
        </div>

        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
        </div>

        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
        </div>

        <button type="submit" class="submit-btn">Sign Up</button>
    </form>

    <p class="login-link">
        Already have an account? <a href="{% url 'experimentee_login' %}">Login</a>
    </p>
</div>

<style>
    .signup-form {
        max-width: 400px;
        margin: 20px auto;
        padding: 25px;
        background: #f8f9fa;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        text-align: center;
    }
    .form-group {
        margin-bottom: 15px;
        text-align: left;
    }
    label {
        font-weight: bold;
        margin-bottom: 5px;
        display: block;
    }
    input[type="text"],
    input[type="password"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        box-sizing: border-box;
    }
    .submit-btn {
        width: 100%;
        padding: 12px;
        background-color: #007BFF;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        transition: background-color 0.3s;
    }
    .submit-btn:hover {
        background-color: #0056b3;
    }
    .login-link {
        margin-top: 15px;
        font-size: 14px;
    }
    .login-link a {
        color: #007BFF;
        text-decoration: none;
    }
    .login-link a:hover {
        text-decoration: underline;
    }
    .error-message {
        color: red;
        font-weight: bold;
        margin-bottom: 10px;
    }
</style>
{% endblock %}
