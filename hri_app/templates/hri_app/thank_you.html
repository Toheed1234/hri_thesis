{% extends 'hri_app/base.html' %}
{% block content %}
<div class="thank-you-container">
    <h1>Thank You for Your Feedback! 🙌</h1>
    <p>We appreciate your time and effort in helping us improve.</p>
    <a href="{% url 'home' %}" class="home-btn">Return to Home</a>
</div>

<style>
    .thank-you-container {
        text-align: center;
        max-width: 500px;
        margin: 50px auto;
        padding: 30px;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }
    h1 {
        color: #007BFF;
    }
    p {
        font-size: 18px;
        color: #555;
        margin-bottom: 20px;
    }
    .home-btn {
        display: inline-block;
        padding: 12px 20px;
        background-color: #007BFF;
        color: white;
        border-radius: 5px;
        text-decoration: none;
        font-size: 16px;
        transition: background-color 0.3s;
    }
    .home-btn:hover {
        background-color: #0056b3;
    }
</style>
{% endblock %}
